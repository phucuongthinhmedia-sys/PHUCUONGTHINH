<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test SSE Connection</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #0a192f;
        margin-bottom: 20px;
      }
      .status {
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: 600;
      }
      .status.connected {
        background: #d1fae5;
        color: #065f46;
      }
      .status.disconnected {
        background: #fee2e2;
        color: #991b1b;
      }
      .events {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 15px;
        max-height: 400px;
        overflow-y: auto;
      }
      .event {
        padding: 10px;
        margin-bottom: 10px;
        background: white;
        border-left: 3px solid #3b82f6;
        border-radius: 4px;
        font-family: "Courier New", monospace;
        font-size: 13px;
      }
      .timestamp {
        color: #6b7280;
        font-size: 11px;
      }
      button {
        background: #0a192f;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        margin-right: 10px;
      }
      button:hover {
        background: #0d2137;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔌 Test SSE Connection</h1>

      <div id="status" class="status disconnected">❌ Disconnected</div>

      <div style="margin-bottom: 20px">
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="clearEvents()">Clear Events</button>
      </div>

      <h3>Events Log:</h3>
      <div id="events" class="events">
        <p style="color: #6b7280">Waiting for events...</p>
      </div>
    </div>

    <script>
      let eventSource = null;
      const backendUrl = "http://localhost:3001";
      const sseUrl = `${backendUrl}/api/v1/products/events`;

      function updateStatus(connected) {
        const statusEl = document.getElementById("status");
        if (connected) {
          statusEl.className = "status connected";
          statusEl.textContent = "✅ Connected to " + sseUrl;
        } else {
          statusEl.className = "status disconnected";
          statusEl.textContent = "❌ Disconnected";
        }
      }

      function addEvent(message, data = null) {
        const eventsEl = document.getElementById("events");
        const eventEl = document.createElement("div");
        eventEl.className = "event";

        const timestamp = new Date().toLocaleTimeString();
        eventEl.innerHTML = `
                <div class="timestamp">${timestamp}</div>
                <div>${message}</div>
                ${data ? `<pre style="margin-top: 5px; color: #3b82f6;">${JSON.stringify(data, null, 2)}</pre>` : ""}
            `;

        eventsEl.insertBefore(eventEl, eventsEl.firstChild);
      }

      function connect() {
        if (eventSource) {
          eventSource.close();
        }

        addEvent("🔄 Connecting to SSE...");

        eventSource = new EventSource(sseUrl);

        eventSource.onopen = () => {
          updateStatus(true);
          addEvent("✅ SSE connection opened");
        };

        eventSource.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            addEvent("📡 Product event received", data);
          } catch (err) {
            addEvent("⚠️ Failed to parse event", { raw: event.data });
          }
        };

        eventSource.onerror = (error) => {
          updateStatus(false);
          addEvent("❌ SSE error", { error: error.toString() });
          eventSource.close();
        };
      }

      function disconnect() {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
          updateStatus(false);
          addEvent("🔌 Disconnected");
        }
      }

      function clearEvents() {
        document.getElementById("events").innerHTML =
          '<p style="color: #6b7280;">Waiting for events...</p>';
      }

      // Auto-connect on load
      window.addEventListener("load", () => {
        setTimeout(connect, 500);
      });
    </script>
  </body>
</html>
